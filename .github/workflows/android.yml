# Trigger rebuild to verify transient Gradle build errors
name: Build Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Capacitor Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'mobile-app/package-lock.json'

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Root Dependencies
        run: |
          npm install

      - name: Install Mobile App Dependencies
        run: |
          cd mobile-app
          npm install

      - name: Build Web Application
        run: |
          cd mobile-app
          npm run build

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        run: |
          cd mobile-app
          npx cap sync

      - name: Build Android Debug APK
        run: |
          cd mobile-app/android
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CodeVault-Mobile-Debug-APK
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Delete existing latest release
          gh release delete latest --yes || true
          
          # Delete tag on remote and locally
          git push --delete origin latest || true
          git tag -d latest || true
          
          # Recreate tag and push
          git tag latest
          git push origin latest
          
          # Create new release with the APK
          gh release create latest mobile-app/android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Latest Mobile Build" \
            --notes "This release contains the latest mobile APK build compiled automatically from the main branch."
