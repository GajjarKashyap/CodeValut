<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeVault — Redirecting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #121212;
      color: #9e9e9e;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 12px;
    }
    .dot { width: 8px; height: 8px; background: #c8ab7e; border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
  </style>
  <script>
    // Redirect to the app root — converting standard path to hash path for HashRouter
    var base = '/';
    var path = window.location.pathname;
    if (path.indexOf(base) === 0) {
      path = path.slice(base.length);
    }
    if (path.startsWith('/')) {
      path = path.slice(1);
    }
    
    var target = window.location.origin + base;
    if (path && path !== 'index.html') {
      target += '#/' + path;
    }
    
    target += window.location.search + window.location.hash;
    window.location.replace(target);
  </script>
</head>
<body>
  <div class="dot"></div>
  <p>Redirecting to CodeVault...</p>
</body>
</html>
